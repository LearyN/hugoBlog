<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马来西亚汽车热门趋势 🇲🇾 | bitauto.my 编辑团队</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eaeaea;
    --muted: #888;
    --green: #2ecc71;
    --orange: #f39c12;
    --blue: #3498db;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }

  .header { text-align:center; padding:30px 0 20px; }
  .header h1 { font-size:1.8rem; background:linear-gradient(135deg,#e94560,#0f3460); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .header .subtitle { color:var(--muted); font-size:.9rem; margin-top:5px; }
  .header .update-time { color:var(--muted); font-size:.8rem; margin-top:4px; }
  .current-status { text-align:center; padding:10px; font-size:.9rem; color:var(--green); }
  .current-status span { display:inline-block; margin:0 12px; }

  .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
  .btn { padding:8px 18px; border:1px solid var(--accent2); background:var(--card); color:var(--text); border-radius:20px; cursor:pointer; font-size:.85rem; transition:.2s; }
  .btn:hover { border-color:var(--accent); background:#252542; }
  .btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  .tab-bar { display:flex; gap:0; justify-content:center; margin:10px 0 20px; }
  .tab-btn { padding:8px 22px; border:1px solid var(--accent2); background:var(--card); color:var(--text); cursor:pointer; font-size:.85rem; transition:.2s; }
  .tab-btn:first-child { border-radius:20px 0 0 20px; }
  .tab-btn:last-child { border-radius:0 20px 20px 0; }
  .tab-btn.active { background:var(--accent2); border-color:var(--accent2); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; max-width:1200px; margin:0 auto; }
  .card { background:var(--card); border-radius:12px; padding:16px; border:1px solid #2a2a40; transition:.15s; }
  .card:hover { transform:translateY(-2px); border-color:var(--accent); }
  .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .card-name { font-size:1rem; font-weight:600; }
  .card-stats { display:flex; gap:8px; align-items:center; }
  .stat-badge { background:var(--bg); padding:2px 8px; border-radius:10px; font-size:.7rem; color:var(--muted); }
  .stat-badge.avg { color:var(--blue); }
  .stat-badge.peak { color:var(--orange); }

  .trend-bars { display:flex; align-items:flex-end; height:40px; gap:1px; margin-top:4px; }
  .trend-bar { flex:1; min-width:2px; border-radius:1px 1px 0 0; background:var(--accent2); }
  .trend-bar.high { background:var(--accent); }
  .trend-bar.medium { background:var(--orange); }
  .trend-bar.low { background:var(--accent2); }
  .trend-dir { font-size:.75rem; margin-top:4px; color:var(--muted); }
  .trend-dir.up { color:var(--green); }
  .trend-dir.down { color:var(--accent); }

  .rising-section { max-width:900px; margin:0 auto; }
  .rising-brand { background:var(--card); border-radius:12px; padding:20px; margin-bottom:16px; border:1px solid #2a2a40; }
  .rising-brand h3 { font-size:1.1rem; margin-bottom:12px; color:var(--orange); }
  .rising-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #1f1f35; }
  .rising-item:last-child { border-bottom:none; }
  .rising-query { font-size:.9rem; }
  .rising-change { background:var(--bg); padding:2px 10px; border-radius:10px; font-size:.75rem; color:var(--green); font-weight:600; white-space:nowrap; }

  .ideas-section { max-width:900px; margin:0 auto; }
  .idea-card { background:var(--card); border-radius:12px; padding:16px; margin-bottom:12px; border:1px solid #2a2a40; border-left:3px solid var(--accent); }
  .idea-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .idea-brand-tag { display:inline-block; background:var(--accent2); padding:2px 10px; border-radius:8px; font-size:.75rem; }
  .idea-category { font-size:.75rem; color:var(--orange); }
  .idea-query { font-size:.9rem; font-weight:600; margin:6px 0; }
  .idea-change { font-size:.75rem; color:var(--green); }
  .idea-titles { margin-top:8px; padding-left:12px; border-left:2px solid var(--accent2); }
  .idea-title { font-size:.8rem; color:var(--muted); padding:3px 0; }
  .idea-title::before { content:"→ "; color:var(--accent); }

  .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:300px; gap:15px; }
  .spinner { width:40px; height:40px; border:3px solid var(--card); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty .emoji { font-size:3rem; margin-bottom:15px; }
  .footer { text-align:center; padding:30px; color:var(--muted); font-size:.75rem; }
  .error-msg { text-align:center; padding:20px; color:var(--accent); }

  @media(max-width:600px) {
    .grid { grid-template-columns:1fr; }
    .header h1 { font-size:1.3rem; }
    .rising-item { flex-direction:column; align-items:flex-start; gap:4px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🚗 马来西亚汽车热门趋势</h1>
  <div class="subtitle">bitauto.my 编辑团队 · 选题参考工具</div>
  <div class="update-time" id="updateTime">加载中...</div>
  <div class="current-status">
    <span id="brandCount">-</span> 个品牌
    <span id="risingCount">-</span> 个飙升搜索
    <span id="ideaCount">-</span> 条内容建议
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="brands">🏷️ 品牌热度</button>
  <button class="tab-btn" data-tab="rising">🔥 飙升搜索</button>
  <button class="tab-btn" data-tab="ideas">💡 内容规划</button>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div>正在加载数据...</div>
</div>
<div id="content" style="display:none;"></div>

<div class="footer">
  数据来源: SerpAPI / Google Trends · 每周更新 · 选题参考
</div>

<script>
let data = null;
let currentTab = 'brands';

async function load() {
  try {
    const r = await fetch('data/trends.json');
    data = await r.json();
    document.getElementById('updateTime').textContent =
      '更新于: ' + new Date(data.fetched_at).toLocaleString('zh-CN');
    if (data.summary) {
      document.getElementById('brandCount').textContent = data.summary.total_brands || '-';
      document.getElementById('risingCount').textContent = data.summary.total_rising || '0';
      document.getElementById('ideaCount').textContent = data.summary.total_ideas || '0';
    }
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML =
      '<div class="error-msg">❌ 数据加载失败，请稍后再试</div>';
  }
}

// ===== 品牌热度 =====
function renderBrands() {
  const brands = data.brands;
  const sorted = Object.entries(brands).sort((a,b) => b[1].avg - a[1].avg);
  if (!sorted.length) return '<div class="empty"><div class="emoji">📭</div><p>暂无品牌数据</p></div>';

  let html = '<div class="grid">';
  sorted.forEach(([name, info], i) => {
    const scores = info.scores;
    const max = Math.max(...scores, 1);
    const half = Math.floor(scores.length/2) || 1;
    const fAvg = scores.slice(0,half).reduce((a,b)=>a+b,0)/half;
    const sAvg = scores.slice(half).reduce((a,b)=>a+b,0)/half;
    const diff = sAvg - fAvg;
    let dir = 'flat', dirEmoji = '➡️';
    if (diff > 3) { dir = 'up'; dirEmoji = '📈'; }
    else if (diff < -3) { dir = 'down'; dirEmoji = '📉'; }
    const bars = scores.map(s => {
      const pct = s/max;
      const cls = pct > 0.7 ? 'high' : pct > 0.4 ? 'medium' : 'low';
      return `<div class="trend-bar ${cls}" style="height:${pct*100}%;"></div>`;
    }).join('');
    html += `<div class="card">
      <div class="card-header">
        <span class="card-name">${i<3?'🥇🥈🥉'[i]+' ':''}${name}</span>
        <div class="card-stats">
          <span class="stat-badge avg">μ${info.avg}</span>
          <span class="stat-badge peak">▲${info.peak}</span>
        </div>
      </div>
      <div class="trend-bars">${bars}</div>
      <div class="trend-dir ${dir}">${dirEmoji} ${dir==='up'?'上升趋势':dir==='down'?'下降趋势':'平稳'}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ===== 飙升搜索 =====
function renderRising() {
  const rising = data.rising;
  if (!rising || !Object.keys(rising).length)
    return '<div class="empty"><div class="emoji">🔍</div><p>暂无飙升搜索数据</p></div>';

  let html = '<div class="rising-section">';
  Object.entries(rising).forEach(([brand, items]) => {
    if (!items.length) return;
    html += `<div class="rising-brand"><h3>🔥 ${brand}</h3>`;
    items.forEach(item => {
      const pct = item.value;
      html += `<div class="rising-item">
        <span class="rising-query">${item.query}</span>
        <span class="rising-change">${pct}</span>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ===== 内容规划 =====
function renderIdeas() {
  const ideas = data.content_ideas;
  if (!ideas || !ideas.length)
    return '<div class="empty"><div class="emoji">💡</div><p>暂无内容规划建议</p></div>';

  let html = '<div class="ideas-section">';
  ideas.forEach(idea => {
    html += `<div class="idea-card">
      <div class="idea-header">
        <span class="idea-brand-tag">${idea.brand}</span>
        <span class="idea-category">${idea.category_cn}</span>
      </div>
      <div class="idea-query">${idea.query}</div>
      <div class="idea-change">搜索增长: ${idea.change}</div>
      <div class="idea-titles">
        <div class="idea-title">${idea.suggested_titles[0]}</div>
        <div class="idea-title">${idea.suggested_titles[1]}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function render() {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('content');
  el.style.display = 'block';

  if (!data) {
    el.innerHTML = '<div class="empty"><div class="emoji">❌</div><p>数据为空</p></div>';
    return;
  }

  switch(currentTab) {
    case 'brands':
      el.innerHTML = '<h2 style="text-align:center;margin:10px 0 20px;font-size:1.1rem;">🏷️ 品牌热度排行（近30天）</h2>' + renderBrands();
      break;
    case 'rising':
      el.innerHTML = '<h2 style="text-align:center;margin:10px 0 20px;font-size:1.1rem;">🔥 飙升搜索词 · 马来西亚汽车</h2>' + renderRising();
      break;
    case 'ideas':
      el.innerHTML = '<h2 style="text-align:center;margin:10px 0 20px;font-size:1.1rem;">💡 内容规划建议 · 按热度排序</h2>' + renderIdeas();
      break;
  }
}

document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || !btn.dataset.tab) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  render();
});

load();
</script>
</body>
</html>
